name: Remote Update EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: executing remote ssh commands using pem key
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }} 
          port: 22
          script: |
            # 1. Load environment (crucial for finding node/npm/pm2)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 2. Navigate to your app
            cd /home/apps/${{ secrets.USER }}/smart-world-backend
            
            # 3. Pull latest code
            git pull origin main
            
            # 4. Install packages 
            npm install --production
            
            # 5. Smart Restart
            # This tries to restart; if it's not running, it starts it fresh.
            pm2 restart "smartworldbackend" || pm2 start index.js --name "smartworldbackend"
            
            # 6. Keep the state saved for server reboots
            pm2 save